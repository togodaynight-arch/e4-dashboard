<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E4 Vendas - Painel</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
</head>
<body>
    <nav class="top-nav">
        <div class="nav-inner">
            <a class="brand-logo">
                <svg width="28" height="28" viewBox="0 0 28 28" fill="none"><rect width="28" height="28" rx="6" fill="#fff"/><path d="M7 14L11 18L21 8" stroke="#d9b759" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span>E4 Vendas</span>
            </a>
            <a class="nav-link" href="/scanner" style="display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.2);border:none;color:#fff;padding:8px 18px;border-radius:6px;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;text-decoration:none;">
                <i class="material-icons" style="font-size:18px;">qr_code_scanner</i> Leitor
            </a>
            <div class="nav-loading" id="global-spinner">
                <div class="spinner"></div>
                <span>Carregando...</span>
            </div>
        </div>
    </nav>

    <div class="dashboard-body">
        <div class="filter-bar">
            <form id="form-filters" onsubmit="return false;">
                <div class="filter-group">
                    <label>Loja</label>
                    <select id="loja-filter">
                        <option value="">Todas as lojas</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label>Período</label>
                    <select id="period-filter">
                        <option value="day" selected>Hoje</option>
                        <option value="week">Últimos 7 Dias</option>
                        <option value="mon">Esse Mês</option>
                        <option value="all">Todo Período</option>
                        <option value="custom">Escolher Período</option>
                    </select>
                </div>
                <div class="filter-group custom-dates" id="custom-dates" style="display:none;">
                    <label>De</label>
                    <input type="date" id="dataInicio">
                    <label>Até</label>
                    <input type="date" id="dataFim">
                </div>
                <div class="filter-group">
                    <label>Buscar</label>
                    <input type="text" id="cupom-search" placeholder="Cupom, produto...">
                </div>
                <div class="filter-group">
                    <label>Status</label>
                    <select id="status-filter">
                        <option value="">Todos</option>
                        <option value="autorizado">Autorizados</option>
                        <option value="cancelado">Cancelados</option>
                    </select>
                </div>
                <button class="btn-filter" onclick="toggleLogPorta()" id="btn-logporta" style="background:#718096;">
                    <i class="material-icons" style="font-size:14px;">visibility</i> Entradas
                </button>
                <button class="btn-filter" onclick="loadDashboard()">
                    <i class="material-icons">chevron_right</i>
                </button>
                <button class="btn-filter" onclick="exportXLSX()" style="background:#38a169;">
                    <i class="material-icons">download</i>
                </button>
                <div class="filter-group">
                    <label>Por Página</label>
                    <select id="page-size" onchange="changePageSize(this.value)">
                        <option value="10">10</option>
                        <option value="20">20</option>
                        <option value="50">50</option>
                        <option value="100">100</option>
                        <option value="9999">Todas</option>
                    </select>
                </div>
            </form>
        </div>

        <div class="progress-section" id="progress-container" style="display:none;">
            <div class="progress-card">
                <div class="progress-info">
                    <span id="progress-text">Carregando dados...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            </div>
        </div>

        <div class="cards-row">
            <div class="card payment-card"><div class="card-content">
                <img src="https://app.igetmarket.com.br/assets/img/card.png" class="card-icon-img" width="60" height="42">
                <span class="card-title">Cartão</span>
                <p class="card-value" id="val-cartao">R$ 0,00</p>
                <p class="card-subtitle" id="count-cartao">0 transações</p>
            </div></div>
            <div class="card payment-card"><div class="card-content">
                <img src="https://app.igetmarket.com.br/assets/img/picpay-44.png" class="card-icon-img" width="100">
                <span class="card-title">PicPay</span>
                <p class="card-value" id="val-picpay">R$ 0,00</p>
                <p class="card-subtitle" id="count-picpay">0 transações</p>
            </div></div>
            <div class="card payment-card"><div class="card-content">
                <img src="https://app.igetmarket.com.br/assets/img/pix-106.png" class="card-icon-img" width="100">
                <span class="card-title">Pix</span>
                <p class="card-value" id="val-pix">R$ 0,00</p>
                <p class="card-subtitle" id="count-pix">0 transações</p>
            </div></div>
        </div>

        <div class="cards-row metrics">
            <div class="card metric-card"><div class="card-content"><span class="card-title">Compras</span><p class="card-value" id="metric-compras">0</p></div></div>
            <div class="card metric-card"><div class="card-content"><span class="card-title">Receita</span><p class="card-value" id="metric-receita">R$ 0,00</p></div></div>
            <div class="card metric-card"><div class="card-content"><span class="card-title">Ticket Médio</span><p class="card-value" id="metric-ticket">R$ 0,00</p></div></div>
            <div class="card metric-card"><div class="card-content"><span class="card-title">Carteira</span><p class="card-value" id="metric-carteira">R$ 0,00</p></div></div>
        </div>

        <div class="sales-list" id="sales-list">
            <div class="empty-state">Clique em <i class="material-icons" style="font-size:16px;vertical-align:middle;">chevron_right</i> para carregar os dados</div>
        </div>
        <div class="pagination-row" id="pagination-row" style="display:none;">
            <span id="cupons-info">0 registros</span>
            <div class="pagination" id="pagination"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div class="modal-header">
                <h2 id="modal-title">Detalhe</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body" id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
